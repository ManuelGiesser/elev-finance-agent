name: ELEV Finance Agent CI

on:
  push:
    branches: ["main", "clean-starter", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker compose build api