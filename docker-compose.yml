services:
  api:
    build: ./backend
    container_name: elev_api
    env_file:
      - .env
    ports:
      - "8000:80"
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: elev_frontend
    ports:
      - "3000:5173"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: elev_postgres
    environment:
      POSTGRES_DB: elev_finance
      POSTGRES_USER: elev
      POSTGRES_PASSWORD: bitte_aendern
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: elev_redis
    restart: unless-stopped

volumes:
  postgres_data: